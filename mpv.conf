# ============================================================
# mpv.net 配置 — 合并版
# 播放核心: 高品质设置 (HDR/deband/cache/cscale)
# 操作习惯: 旧配置 (置顶/记忆位置/OSD样式/字幕/截图)
# 界面: 内置 OSC + thumbfast 缩略图
# ============================================================

# ----- 渲染器 -----
vo=gpu-next
gpu-api=d3d11
gpu-context=d3d11
fbo-format=rgba16f

# ----- 硬件解码 -----
hwdec=no                          # 默认软解

# ----- HDR→SDR 色调映射 -----
tone-mapping=hable
hdr-compute-peak=yes
hdr-peak-decay-rate=20.0
hdr-scene-threshold-low=1.0
hdr-scene-threshold-high=3.0
hdr-contrast-recovery=0.50
hdr-contrast-smoothness=3.5

# ----- 视频缩放 -----
scale=ewa_lanczossharp
dscale=catmull_rom
cscale=ewa_lanczos
sigmoid-upscaling=yes
linear-downscaling=yes
correct-downscaling=yes

# ----- 去色带 -----
deband=yes
deband-iterations=2
deband-threshold=35
deband-range=16

# ----- 缓存 -----
cache=yes
demuxer-max-bytes=150MiB
cache-secs=10

# ----- 音频 -----
#ao=wasapi
#audio-channels=stereo

# ----- 操作习惯 -----
save-position-on-quit=yes         # 退出时记忆播放位置
ontop=yes                         # 默认置顶窗口

# ----- 界面 -----
#osc=no                           # 使用内置 OSC

# ----- OSD -----
osd-bar-h=1
osd-bar-align-y=-1
osd-border-size=1
osd-font-size=40
osd-on-seek=msg-bar
osd-duration=1000

# ----- 字幕 -----
sub-auto=fuzzy
#sub-font='汉仪中黑 S'
#sub-border-size=1

# ----- 截图 -----
screenshot-format=png
screenshot-webp-lossless=yes
screenshot-webp-compression=4
screenshot-template='C:\Users\zhouy\Pictures\Capture\MPV-%F %P-N%n'
screenshot-tag-colorspace=yes
screenshot-high-bit-depth=no

# ============================================================
# SDR 回退
#   运行时: 按 ` 输入 apply-profile sdr
# ============================================================
[SDR]
profile-desc="Revert to SDR output"
target-trc=auto
target-contrast=auto
tone-mapping=hable

# ============================================================
# HDR 输出模式 — 仅在 Windows HDR 开启时启用
#   运行时: 按 ` 输入 apply-profile hdr-output
# ============================================================
[HDR]
profile-desc="HDR output mode"
target-trc=pq
target-contrast=auto
tone-mapping=bt.2446a
