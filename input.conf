i           script-binding stats/display-stats-toggle  # 查看 > 切换 统计信息
_           script-message-to mpvnet show-media-info osd  # 查看 > 显示媒体信息

# ----- 媒体键 -----
SPACE      cycle pause
PLAY       cycle pause
PAUSE      cycle pause
PLAYPAUSE  cycle pause
STOP       stop
FORWARD    seek  30
REWIND     seek -30
NEXT       script-message-to mpvnet playlist-add  1
PREV       script-message-to mpvnet playlist-add -1
MBTN_FORWARD script-message-to mpvnet playlist-add  1
MBTN_BACK  script-message-to mpvnet playlist-add -1
MBTN_LEFT  ignore
MBTN_LEFT_DBL cycle fullscreen
MBTN_RIGHT script-message-to mpvnet show-menu
Wheel_UP   add volume  1
Wheel_DOWN add volume -1
ESC        set fullscreen no
DOWN       add volume -5
UP         add volume  5

# ----- 文件/导航 -----
o          script-message-to mpvnet open-files
F7         script-message-to mpvnet show-recent
l          ab-loop
L          cycle-values loop-file inf no
,          frame-back-step
.          frame-step
LEFT       seek -5
RIGHT      seek  5
PGUP       add chapter -1
PGDWN      add chapter  1

# ----- 速度 -----
[          add speed -0.1
]          add speed  0.1
BS         set speed 1

# ----- 画面 -----
T          cycle ontop
ENTER      cycle fullscreen
p          cycle-values panscan 0.0 1.0
CTRL+-     add video-zoom -0.1
CTRL+=     add video-zoom  0.1
CTRL+BS    set video-zoom 0; set panscan 0; set video-rotate 0
a          cycle-values video-aspect-override 16:9 4:3 2.35:1 -1
b          cycle border

# ----- 窗口缩放 -----
ALT+`      script-message-to mpvnet window-scale 0.5
ALT+1      script-message-to mpvnet window-scale 1.0
ALT+2      script-message-to mpvnet window-scale 1.5
ALT+3      script-message-to mpvnet window-scale 2.0
ALT+-      script-message-to mpvnet scale-window 0.8
ALT+=      script-message-to mpvnet scale-window 1.2

# ----- 视频 -----
CTRL+h     cycle-values hwdec no yes auto-copy
d          cycle deinterlace
D          cycle deband

# ----- 均衡器 -----
1          add contrast -1
2          add contrast  1
3          add brightness -1
4          add brightness  1
5          add gamma -1
6          add gamma  1
7          add saturation -1
8          add saturation  1
9          add hue -1
0          add hue  1
SHIFT+BS   set contrast 0; set brightness 0; set gamma 0; set saturation 0; set hue 0

# ----- 截图 -----
s          screenshot subtitles
S          screenshot video
CTRL+s     screenshot window

# ----- 音频 -----
m          cycle mute
-          add volume -1
=          add volume  1
c          add audio-delay -0.1
v          add audio-delay  0.1
CTRL+a     script-binding cycle_adevice/back
ALT+a      script-binding cycle_adevice/next

# ----- 字幕 -----
CTRL+l     script-message-to mpvnet cycle-subtitles
z          add sub-delay -0.1
x          add sub-delay  0.1
CTRL+z     add sub-pos -1
CTRL+x     add sub-pos +1
Z          add sub-scale -0.1
X          add sub-scale  0.1

# ----- 工具 -----
`          script-binding console/enable
CTRL+M     script-message-to mpvnet show-conf-editor
CTRL+I     script-message-to mpvnet show-input-editor
F1         script-message-to mpvnet show-command-palette

# ----- 退出 -----
CTRL+q     quit
Q          quit-watch-later
POWER      quit
